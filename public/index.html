<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #333; }
    .header { background: #1a1a2e; color: white; padding: 1.5rem 2rem; }
    .header h1 { font-size: 1.5rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #1a1a2e; border-bottom: 2px solid #e94560; padding-bottom: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.4rem; font-size: 0.9rem; }
    input, textarea, select { width: 100%; padding: 0.7rem; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 0.95rem; }
    input:focus, textarea:focus { outline: none; border-color: #e94560; }
    textarea { min-height: 80px; }
    .btn { background: #e94560; color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #d63d56; }
    .btn-secondary { background: #1a1a2e; }
    .invoice-preview { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; }
    .invoice-paper { padding: 3rem; min-height: 800px; }
    .invoice-header { display: flex; justify-content: space-between; margin-bottom: 2rem; }
    .invoice-title { font-size: 2.5rem; font-weight: bold; color: #1a1a2e; text-transform: uppercase; letter-spacing: 4px; }
    .invoice-number { color: #666; font-size: 1rem; margin-top: 0.5rem; }
    .invoice-meta { text-align: right; }
    .invoice-meta .label { font-size: 0.8rem; color: #999; text-transform: uppercase; }
    .invoice-meta .value { font-size: 1.1rem; font-weight: 500; }
    .invoice-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin: 2rem 0; }
    .party-label { font-size: 0.8rem; color: #999; text-transform: uppercase; margin-bottom: 0.5rem; }
    .party-name { font-weight: bold; font-size: 1.1rem; }
    .party-details { color: #666; font-size: 0.95rem; }
    .invoice-table { width: 100%; border-collapse: collapse; margin: 2rem 0; }
    .invoice-table th { background: #1a1a2e; color: white; padding: 0.8rem; text-align: left; font-size: 0.85rem; text-transform: uppercase; }
    .invoice-table td { padding: 0.8rem; border-bottom: 1px solid #eee; }
    .invoice-table th:last-child, .invoice-table td:last-child { text-align: right; }
    .invoice-totals { text-align: right; margin-top: 1rem; }
    .invoice-totals .row { display: flex; justify-content: flex-end; padding: 0.5rem 0; }
    .invoice-totals .label { width: 150px; color: #666; }
    .invoice-totals .value { width: 120px; font-weight: 500; }
    .invoice-totals .total { font-size: 1.4rem; font-weight: bold; color: #1a1a2e; border-top: 2px solid #1a1a2e; padding-top: 0.5rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab { padding: 0.6rem 1.2rem; background: #eee; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .tab.active { background: #e94560; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .logo-upload { border: 2px dashed #ddd; padding: 1.5rem; text-align: center; border-radius: 8px; cursor: pointer; }
    .color-inputs { display: flex; gap: 1rem; }
    .color-inputs input[type="color"] { width: 50px; height: 40px; }
    @media print { body { background: white; } .no-print { display: none; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Invoice Generator</h1>
  </div>
  <div class="container">
    <div class="tabs no-print">
      <button class="tab active" onclick="switchTab('create')">Create Invoice</button>
      <button class="tab" onclick="switchTab('invoices')">My Invoices</button>
      <button class="tab" onclick="switchTab('settings')">Business Settings</button>
    </div>
    <div id="create" class="tab-content active">
      <div class="main-grid">
        <div class="no-print">
          <div class="card">
            <h2>Client Details</h2>
            <div class="form-group"><label>Client Name</label><input type="text" id="clientName" placeholder="Client Company LLC"></div>
            <div class="form-group"><label>Client Email</label><input type="email" id="clientEmail" placeholder="client@company.com"></div>
            <div class="form-group"><label>Client Address</label><textarea id="clientAddress" placeholder="456 Client St&#10;City, State 12345"></textarea></div>
          </div>
          <div class="card">
            <h2>Invoice Details</h2>
            <div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div>
            <div class="form-group"><label>Currency</label><select id="currency"><option value="USD">USD ($)</option><option value="EUR">EUR</option><option value="GBP">GBP</option></select></div>
            <div class="form-group"><label>Tax Rate (%)</label><input type="number" id="taxRate" value="0"></div>
          </div>
          <div class="card">
            <h2>Line Items</h2>
            <div id="lineItems"></div>
            <button class="btn" style="background:transparent;border:2px solid #e94560;color:#e94560" onclick="addLineItem()">+ Add Item</button>
          </div>
          <div class="card"><h2>Notes</h2><textarea id="notes" placeholder="Payment terms, thank you note..."></textarea></div>
          <button class="btn" onclick="generateInvoice()">Generate Invoice</button>
        </div>
        <div>
          <div class="invoice-preview"><div class="invoice-paper" id="invoicePreview"></div></div>
          <div style="text-align:center;margin-top:1rem" class="no-print"><button class="btn btn-secondary" onclick="window.print()">Print / Save PDF</button></div>
        </div>
      </div>
    </div>
    <div id="invoices" class="tab-content">
      <div class="card"><h2>Your Invoices</h2><div id="invoicesList"><p style="color:#666">No invoices yet.</p></div></div>
    </div>
    <div id="settings" class="tab-content">
      <div class="card">
        <h2>Business Details</h2>
        <div class="form-group"><label>Business Name</label><input type="text" id="businessName" placeholder="Your Company LLC"></div>
        <div class="form-group"><label>Email</label><input type="email" id="businessEmail" placeholder="you@company.com"></div>
        <div class="form-group"><label>Address</label><textarea id="businessAddress" placeholder="123 Business St&#10;City, State"></textarea></div>
        <div class="form-group"><label>Brand Color</label><input type="color" id="primaryColor" value="#1a1a2e"></div>
        <div class="form-group"><label>Stripe Payment Link</label><input type="text" id="stripeLink" placeholder="https://buy.stripe.com/..."></div>
        <button class="btn" onclick="saveBusinessSettings()">Save Settings</button>
      </div>
    </div>
  </div>
  <script>
    let currentInvoice = null, businessSettings = { name: 'Your Business', email: '', address: '', primaryColor: '#1a1a2e', accentColor: '#e94560', stripeLink: '' };
    let lineItems = [{ description: 'Service', quantity: 1, price: 100 }];
    document.addEventListener('DOMContentLoaded', () => { document.getElementById('dueDate').value = new Date(Date.now()+30*864e5).toISOString().split('T')[0]; renderLineItems(); renderInvoicePreview(); loadBusinessSettings(); });
    function switchTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelector('[onclick="switchTab(\''+id+'\')"]').classList.add('active'); if (id === 'invoices') loadInvoices(); }
    function renderLineItems() { document.getElementById('lineItems').innerHTML = lineItems.map((item,i) => '<div style="display:grid;grid-template-columns:2fr 80px 100px 40px;gap:0.5rem;margin-bottom:0.5rem"><input type="text" placeholder="Description" value="'+item.description+'" onchange="lineItems['+i+'].description=this.value;renderInvoicePreview()"><input type="number" value="'+item.quantity+'" onchange="lineItems['+i+'].quantity=parseFloat(this.value);renderInvoicePreview()"><input type="number" value="'+item.price+'" onchange="lineItems['+i+'].price=parseFloat(this.value);renderInvoicePreview()"><button class="btn" style="background:#f93e3e" onclick="removeLineItem('+i+')">×</button></div>').join(''); }
    function addLineItem() { lineItems.push({ description: '', quantity: 1, price: 0 }); renderLineItems(); renderInvoicePreview(); }
    function removeLineItem(i) { lineItems.splice(i,1); renderLineItems(); renderInvoicePreview(); }
    function formatCurrency(a,c) { return new Intl.NumberFormat('en-US',{style:'currency',currency:c||'USD'}).format(a); }
    function generateInvoice() {
      const invoice = { business: {...businessSettings}, client: { name: document.getElementById('clientName').value||'Client', email: document.getElementById('clientEmail').value, address: document.getElementById('clientAddress').value }, dueDate: document.getElementById('dueDate').value, currency: document.getElementById('currency').value, taxRate: parseFloat(document.getElementById('taxRate').value)||0, notes: document.getElementById('notes').value, items: lineItems.filter(i => i.description), primaryColor: businessSettings.primaryColor, accentColor: businessSettings.accentColor };
      invoice.subtotal = invoice.items.reduce((s,i) => s + i.quantity*i.price, 0);
      invoice.taxAmount = invoice.subtotal * invoice.taxRate/100;
      invoice.total = invoice.subtotal + invoice.taxAmount;
      const d = new Date(); invoice.invoiceNumber = 'INV-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+'-'+Math.floor(Math.random()*1e4).toString().padStart(4,'0');
      currentInvoice = invoice; renderInvoicePreview();
      fetch('/api/invoices', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(invoice) }).then(r => r.json()).then(d => { invoice.id = d.id; currentInvoice = invoice; alert('Invoice saved!'); });
    }
    function renderInvoicePreview() {
      const inv = currentInvoice || { invoiceNumber: 'INV-XXXX', business: businessSettings, client: { name:'Client',email:'',address:''}, dueDate: document.getElementById('dueDate').value, currency: document.getElementById('currency').value||'USD', taxRate: parseFloat(document.getElementById('taxRate').value)||0, notes: document.getElementById('notes').value, items: lineItems.filter(i=>i.description), primaryColor: businessSettings.primaryColor };
      inv.subtotal = inv.items.reduce((s,i) => s + i.quantity*i.price, 0);
      inv.taxAmount = inv.subtotal * inv.taxRate/100;
      inv.total = inv.subtotal + inv.taxAmount;
      inv.paymentLink = inv.business.stripeLink;
      document.getElementById('invoicePreview').innerHTML = '<div class="invoice-header"><div><div class="invoice-title" style="color:'+inv.primaryColor+'">INVOICE</div><div class="invoice-number">#'+inv.invoiceNumber+'</div></div><div class="invoice-meta"><div class="label">Date</div><div class="value">'+new Date().toLocaleDateString()+'</div><div class="label">Due Date</div><div class="value">'+inv.dueDate+'</div></div></div><div class="invoice-parties"><div><div class="party-label">From</div><div class="party-name" style="color:'+inv.primaryColor+'">'+inv.business.name+'</div><div class="party-details">'+(inv.business.address||'').replace(/\n/g,'<br>')+'</div><div class="party-details">'+inv.business.email+'</div></div><div><div class="party-label">Bill To</div><div class="party-name" style="color:'+inv.primaryColor+'">'+inv.client.name+'</div><div class="party-details">'+(inv.client.address||'').replace(/\n/g,'<br>')+'</div><div class="party-details">'+inv.client.email+'</div></div></div><table class="invoice-table"><thead><tr style="background:'+inv.primaryColor+'"><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>'+inv.items.map(i => '<tr><td>'+i.description+'</td><td>'+i.quantity+'</td><td>'+formatCurrency(i.price,inv.currency)+'</td><td>'+formatCurrency(i.quantity*i.price,inv.currency)+'</td></tr>').join('')+'</tbody></table><div class="invoice-totals"><div class="row"><span class="label">Subtotal</span><span class="value">'+formatCurrency(inv.subtotal,inv.currency)+'</span></div>'+(inv.taxRate>0?'<div class="row"><span class="label">Tax ('+inv.taxRate+'%)</span><span class="value">'+formatCurrency(inv.taxAmount,inv.currency)+'</span></div>':'')+'<div class="row total"><span class="label">Total</span><span class="value">'+formatCurrency(inv.total,inv.currency)+'</span></div></div>'+(inv.notes?'<div style="margin-top:2rem;border-top:1px solid #eee;padding-top:1rem"><div style="font-size:0.8rem;color:#999;text-transform:uppercase;margin-bottom:0.5rem">Notes</div><p>'+inv.notes.replace(/\n/g,'<br>')+'</p></div>':'')+(inv.paymentLink?'<div style="margin-top:2rem;padding:1rem;background:#e8f5e9;border-radius:8px"><p style="font-weight:600;color:#2e7d32">Pay Online</p><p style="font-size:0.9rem"><a href="'+inv.paymentLink+'" style="color:#e94560">'+inv.paymentLink+'</a></p></div>':'');
    }
    function saveBusinessSettings() { businessSettings = { name: document.getElementById('businessName').value, email: document.getElementById('businessEmail').value, address: document.getElementById('businessAddress').value, primaryColor: document.getElementById('primaryColor').value, accentColor: '#e94560', stripeLink: document.getElementById('stripeLink').value }; fetch('/api/business',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(businessSettings)}).then(() => { alert('Saved!'); renderInvoicePreview(); }); }
    function loadBusinessSettings() { fetch('/api/business').then(r=>r.json()).then(d => { if(d.length>0) { businessSettings={...businessSettings,...d[0]}; document.getElementById('businessName').value=businessSettings.name; document.getElementById('businessEmail').value=businessSettings.email; document.getElementById('businessAddress').value=businessSettings.address; document.getElementById('primaryColor').value=businessSettings.primaryColor; document.getElementById('stripeLink').value=businessSettings.stripeLink||''; } }); }
    function loadInvoices() { fetch('/api/invoices').then(r=>r.json()).then(arr => { document.getElementById('invoicesList').innerHTML = arr.length?arr.map(i => '<div style="display:flex;justify-content:space-between;padding:1rem;background:#f8f9fa;border-radius:8px;margin-bottom:0.5rem"><a href="#" onclick="loadInvoice(\''+i.id+'\');return false">'+i.invoiceNumber+'</a><span style="font-weight:bold">'+formatCurrency(i.total,i.currency)+'</span></div>').join(''):'<p style="color:#666">No invoices yet.</p>'; }); }
    function loadInvoice(id) { fetch('/api/invoices/'+id).then(r=>r.json()).then(inv => { currentInvoice=inv; document.getElementById('clientName').value=inv.client.name; document.getElementById('clientEmail').value=inv.client.email; document.getElementById('clientAddress').value=inv.client.address; document.getElementById('dueDate').value=inv.dueDate; document.getElementById('currency').value=inv.currency; document.getElementById('taxRate').value=inv.taxRate; document.getElementById('notes').value=inv.notes; lineItems=inv.items; renderLineItems(); switchTab('create'); renderInvoicePreview(); }); }
  </script>
</body>
</html>
